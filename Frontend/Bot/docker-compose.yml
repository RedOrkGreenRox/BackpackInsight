version: '3.8'

services:
  twitch-monitor:
    build: .
    container_name: twitch-monitor
    restart: unless-stopped
    
    # Переменные окружения
    env_file:
      - config/.env
    
    # Монтирование директорий
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data:/app/data
    
    # Логирование
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Ресурсы
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    
    # Здоровье
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Сеть
    networks:
      - monitor-network

networks:
  monitor-network:
    driver: bridge
