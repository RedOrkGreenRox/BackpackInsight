{% extends "base.html" %}
{% block title %}Википедия предметов - Backpack Insight{% endblock %}

{% block page_styles %}
    <link rel="stylesheet" href="/static/css/recipes.css">
{% endblock %}

{% block content %}
<section class="wiki-section">
    <div class="container">
        <div class="wiki-header">
            <h1 class="main-title" data-aos="fade-down">База Знаний</h1>
            <p class="wiki-subtitle">Все предметы из Backpack Brawl</p>
        </div>
        <div class="items-grid">
            {% for item in items %}
            <div class="item-card"
                 data-aos="fade-up"
                 data-aos-delay="{{ (loop.index0 % 20) * 30 }}">
                <div class="item-image-wrapper">
                    <picture>
                        <source srcset="/static/images/recipes/avif/{{ item.name }}.avif" type="image/avif">
                        <source srcset="/static/images/recipes/webp/{{ item.name }}.webp" type="image/webp">
                        <img src="/static/images/recipes/webp/{{ item.name }}.webp"
                             alt="{{ item.name }}"
                             loading="lazy"
                             class="item-icon">
                    </picture>
                </div>
                <span class="item-name">{{ item.name }}</span>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
