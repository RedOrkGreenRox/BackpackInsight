<!DOCTYPE html>
<html lang="ru">
<head>
    <script>
        (function () {
            // 1. Отключаем штатную прыгучесть браузера сразу
            if ('scrollRestoration' in history) {
                history.scrollRestoration = 'manual';
            }

            // 2. Сразу достаем позицию
            const scrollPos = localStorage.getItem('scrollPos');

            // 3. ПРИМЕНЯЕМ ПОЗИЦИЮ МГНОВЕННО
            // Это заставит браузер считать текущую точку точкой отсчета
            if (scrollPos) {
                window.scrollTo(0, parseInt(scrollPos));
                // Передаем значение в CSS для корректной работы position: fixed
                document.documentElement.style.setProperty('--scroll-y', scrollPos);
            }

            // 4. Блокируем скролл
            document.documentElement.classList.add('lock-scroll');

            // 5. Сохранение при уходе (лучше через addEventListener)
            window.addEventListener('beforeunload', () => {
                localStorage.setItem('scrollPos', window.scrollY);
            });

            window.addEventListener('load', () => {
                setTimeout(() => {
                    // 6. Снимаем блокировку
                    document.documentElement.classList.remove('lock-scroll');

                    // 7. Возвращаем позицию финально (на случай, если страница "выросла")
                    if (scrollPos) {
                        window.scrollTo({
                            top: parseInt(scrollPos),
                            behavior: 'instant'
                        });
                    }
                }, 1000);
            });
        })();
    </script>
    <script>
        // Проверка на медленное соединение или старое железо
        const isLowRes = window.isSlowConnection || window.innerWidth < 480;

        if (isLowRes) {
            // Добавляем класс на html, чтобы скрыть элементы до загрузки lowres.css
            document.documentElement.classList.add('low-res-mode');
        }
    </script>

    <style>
        /* Если включен режим экономии, принудительно отключаем все шрифты сразу */
        .low-res-mode * {
            font-family: sans-serif !important;
            font-weight: 400 !important;
        }
    </style>

    <script>
        (function () {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            window.isSlowConnection = false;

            // 1. Проверка типа соединения
            if (conn) {
                if (conn.saveData || ['slow-2g', '2g', '3g'].includes(conn.effectiveType)) {
                    window.isSlowConnection = true;
                    // Подключаем стили для слабых устройств и вешаем класс на html
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = '/static/css/lowres.css';
                    document.head.appendChild(link);
                    document.documentElement.classList.add('low-res-mode');
                }
            }

            // 2. Динамический Preload (только если соединение НЕ медленное)
            if (!window.isSlowConnection) {
                const fonts = [
                    '/static/fonts/Signika-Regular.woff2',
                    '/static/fonts/NotoSans.woff2'
                ];

                fonts.forEach(fontHref => {
                    const link = document.createElement('link');
                    link.rel = 'preload';
                    link.href = fontHref;
                    link.as = 'font';
                    link.type = 'font/woff2';
                    link.crossOrigin = 'anonymous';
                    document.head.appendChild(link);
                });
            }
        })();
    </script>

<body>

<div class="controls-wrapper">
    <button class="menu-toggle" onclick="toggleSidebar()">
        <img src="/static/images/menu.avif" alt="Menu" class="toggle-icon">
    </button>
    <button class="button-logo" onclick="goTo('/')">
        <img src="/static/images/logo.avif" alt="Home" class="logo-icon">
    </button>
</div>

<nav class="sidebar" id="sidebar">
    <div class="nav-tabs">
        <div class="nav-tab {{ 'active' if request.url.path in ['/', ''] }}" onclick="goTo('/')">
            <img data-src="/static/images/Templates/main.webp" alt="Главная">
            <span class="page-title">Главная</span>
        </div>
        <div class="nav-tab {{ 'active' if request.url.path == '/recipes' }}" onclick="goTo('/recipes')">
            <img data-src="/static/images/Templates/recipes.webp" alt="Рецепты">
            <span class="page-title">Рецепты</span>
        </div>
        <div class="nav-tab {{ 'active' if request.url.path == '/leaderboards' }}" onclick="goTo('/leaderboards')">
            <img data-src="/static/images/Templates/leaderboards.webp" alt="Лидеры">
            <span class="page-title">Таблицы лидеров</span>
        </div>
        <div class="nav-tab {{ 'active' if request.url.path == '/profiles' }}" onclick="goTo('/profiles')">
            <img data-src="/static/images/Templates/profiles.webp" alt="Профили">
            <span class="page-title">Профили</span>
        </div>
    </div>
</nav>

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="background-image" id="bgImage">
    <picture>
        <source srcset="/static/images/Area/avif/Area{{ background_image }}.avif" type="image/avif">
        <source srcset="/static/images/Area/webp/Area{{ background_image }}.webp" type="image/webp">
        <img src="/static/images/Area/webp/Area{{ background_image }}.webp"
             id="bgImg"
             alt="Background"
             fetchpriority="high"
             loading="eager">
    </picture>
</div>

<div class="overlay"></div>

{% block content %}{% endblock %}

<script src="/static/js/aos.js" defer></script>
<script src="/static/js/default.js" defer></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (typeof AOS !== 'undefined') {
            AOS.init({
                duration: 800,
                once: true,
                // Отключаем анимации на медленных соединениях для экономии ресурсов CPU
                disable: window.isSlowConnection
            });
        }
    });
</script>

{% block script %}{% endblock %}
</body>
