{% extends "base.html" %}
{% block page_styles %}
    <link rel="stylesheet" href="/static/css/main.css">
{% endblock %}
{% block title %}Главная{% endblock %}

{% block content %}
<div class="container">
    {% if error %}
    <div class="error" data-aos="zoom-in">{{ error }}</div>
    {% endif %}

    <h1 class="main-title" data-aos="fade-down">Витрина профилей</h1>

    <form method="POST" action="/profile" enctype="multipart/form-data" class="upload-zone">
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept=".json" style="display: none;">
            <label for="jsonInput" class="visually-hidden" style="opacity: 0">Данные профиля (JSON)</label>
            <textarea name="json_text" id="jsonInput" placeholder=""></textarea>
            <div class="upload-hint" id="uploadHint">
                <span>Нажмите для выбора</span>
                <span class="pc-only">Перетащите .json сюда</span>
                <span>Ctrl + V</span>
            </div>
        </div>
        <button class="button-view-profile" type="submit" id="submitBtn">Посмотреть профиль</button>
    </form>
</div>

<script>
    const area = document.getElementById('uploadArea');
    const input = document.getElementById('jsonInput');
    const fInput = document.getElementById('fileInput');
    const hint = document.getElementById('uploadHint');

    function read(file) {
        if (!file) return;
        const r = new FileReader();
        r.onload = (e) => {
            input.value = e.target.result;
            hint.style.display = 'none';
        };
        r.readAsText(file);
    }

    // КЛИК (Мобилки + ПК)
    area.addEventListener('click', (e) => {
        if (input.value.trim() === "") fInput.click();
    });

    // DRAG & DROP (Важно: вешаем на input, чтобы отменить вставку пути)
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => {
        input.addEventListener(n, (e) => {
            e.preventDefault();
            e.stopPropagation();
        });
    });

    input.addEventListener('dragover', () => area.classList.add('drag-over'));
    input.addEventListener('dragleave', () => area.classList.remove('drag-over'));
    input.addEventListener('drop', (e) => {
        area.classList.remove('drag-over');
        read(e.dataTransfer.files[0]);
    });

    // PASTE (Вставка файла через Ctrl+V)
    input.addEventListener('paste', (e) => {
        // Проверяем, есть ли файлы в буфере обмена
        if (e.clipboardData && e.clipboardData.files && e.clipboardData.files.length > 0) {
            e.preventDefault(); // Отменяем стандартную вставку (имени файла)
            read(e.clipboardData.files[0]); // Читаем первый файл
        }
        // Если файлов нет, позволяем стандартную вставку текста
    });

    fInput.addEventListener('change', (e) => read(e.target.files[0]));
    input.addEventListener('input', () => hint.style.display = input.value ? 'none' : 'flex');
</script>
{% endblock %}
