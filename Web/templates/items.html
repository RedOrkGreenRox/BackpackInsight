{% extends "base.html" %}
{% block title %}Википедия предметов - Backpack Insight{% endblock %}
{% block content %}
<section class="wiki-section" style="padding: 100px 20px;">
    <div class="container">
        <div class="wiki-header" style="margin-bottom: 40px; text-align: center;">
            <h1 class="main-title" data-aos="fade-down">База Знаний</h1>
            <p style="color: #888; margin-top: 10px;">Все предметы из Backpack Brawl</p>
        </div>
        <div class="items-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 15px;">
            {% for item in items %}
            <div class="item-card"
                 data-aos="fade-up"
                 data-aos-delay="{{ loop.index0 * 50 }}"
                 style="background: #252525; border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #333;">
                <img src="/static/images/Items/{{ item.icon }}.webp"
                     alt="{{ item.name }}"
                     loading="lazy"
                     style="width: 100%; height: auto; display: block; margin-bottom: 5px;">
                <span style="font-size: 12px; color: #ccc;">{{ item.name }}</span>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
