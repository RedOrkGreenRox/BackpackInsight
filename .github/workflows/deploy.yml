name: CD (Continuous Deployment)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: executing remote ssh commands using password
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/BackpackInsight

            git fetch origin main
            git reset --hard origin/main
            
            # Проверить и конвертировать .env в Unix формат
            if [ -f .env ]; then
                echo "Найден .env, конвертируем в Unix формат..."
                # Показать размер до конвертации
                echo "Размер API_SECRET до: $(grep API_SECRET .env | wc -c)"
                
                # Конвертировать Windows переносы строк в Unix
                sed -i 's/\r$//' .env
                
                # Показать размер после конвертации
                echo "Размер API_SECRET после: $(grep API_SECRET .env | wc -c)"
                
                # Дополнительная проверка на скрытые символы
                echo "Последние 5 символов API_SECRET:"
                grep API_SECRET .env | tail -c 5 | od -c
                
                # Создать отдельный env файл для API_SECRET без интерполяции
                echo "Создаем отдельный env файл для API_SECRET..."
                grep API_SECRET .env > .env.api
                
                # Экранировать все символы которые могут интерполироваться
                sed -i 's/\$/\\$/g' .env.api
            else
                echo "⚠️ .env файл не найден!"
                exit 1
            fi
            
            # Полная пересборка контейнеров
            docker compose -f docker-compose.server.yml down

            # --- ALEMBIC BOOTSTRAP ---
            # БД могла существовать ДО введения Alembic.
            # Проверяем: есть таблица alembic_version?
            #   - есть → миграции идут как обычно при старте контейнера
            #   - нет, но есть таблица profile → БД с данными, stamp'аем head чтобы не пересоздавать таблицы
            #   - нет ни того ни другого → пустая БД, Alembic накатит всё с нуля при старте
            echo "Проверка состояния Alembic..."
            docker compose -f docker-compose.server.yml up -d db
            for i in {1..20}; do
                if docker exec backpack_insight_db pg_isready -U "$(grep ^POSTGRES_USER .env | cut -d= -f2)" >/dev/null 2>&1; then
                    break
                fi
                sleep 1
            done

            POSTGRES_USER_VAL=$(grep ^POSTGRES_USER .env | cut -d= -f2)
            POSTGRES_DB_VAL=$(grep ^POSTGRES_DB .env | cut -d= -f2)

            HAS_ALEMBIC=$(docker exec backpack_insight_db psql -U "$POSTGRES_USER_VAL" -d "$POSTGRES_DB_VAL" -tAc "SELECT to_regclass('public.alembic_version');" 2>/dev/null | tr -d '[:space:]')
            HAS_PROFILE=$(docker exec backpack_insight_db psql -U "$POSTGRES_USER_VAL" -d "$POSTGRES_DB_VAL" -tAc "SELECT to_regclass('public.profile');" 2>/dev/null | tr -d '[:space:]')

            if [ -z "$HAS_ALEMBIC" ] && [ -n "$HAS_PROFILE" ]; then
                echo "📌 БД существует, но без alembic_version — выполняем stamp head"
                docker compose -f docker-compose.server.yml run --rm --no-deps backend alembic -c /app/alembic.ini stamp head
            else
                echo "✅ Alembic state OK ($HAS_ALEMBIC / profile=$HAS_PROFILE) — миграции применятся при старте"
            fi

            # Проверить что Docker прочитает правильный API_SECRET
            echo "Проверка конфигурации Docker:"
            docker compose -f docker-compose.server.yml config | grep -A 3 -B 3 API_SECRET

            docker compose -f docker-compose.server.yml up -d --build --force-recreate
            
            # Ждать пока backend станет доступен
            echo "Ожидание запуска backend..."
            for i in {1..30}; do
                if curl -f http://localhost:8000/ > /dev/null 2>&1; then
                    echo "✅ Backend запущен за $i попыток"
                    break
                fi
                if [ $i -eq 30 ]; then
                    echo "❌ Backend не запустился за 30 попыток"
                    docker compose -f docker-compose.server.yml logs --tail=20 backend
                    exit 1
                fi
                sleep 1
            done
            
            echo "Проверка API_SECRET в контейнере:"
            docker exec backpack_insight_backend env | grep API_SECRET | wc -c
            
            # Проверить что API_SECRET из .env.api имеет правильный размер
            echo "Размер API_SECRET в .env.api: $(cat .env.api | wc -c)"
            
            # Если размер не совпадает, пересобрать еще раз
            ENV_SIZE=$(docker exec backpack_insight_backend env | grep API_SECRET | wc -c)
            API_FILE_SIZE=$(cat .env.api | wc -c)
            
            if [ "$ENV_SIZE" != "$API_FILE_SIZE" ]; then
                echo "❌ Размеры не совпадают! Пересобираем..."
                docker compose -f docker-compose.server.yml down
                docker compose -f docker-compose.server.yml up -d --build --force-recreate
                
                # Ждать повторного запуска
                for i in {1..30}; do
                    if curl -f http://localhost:8000/ > /dev/null 2>&1; then
                        echo "✅ Backend перезапущен за $i попыток"
                        break
                    fi
                    if [ $i -eq 30 ]; then
                        echo "❌ Backend не перезапустился за 30 попыток"
                        exit 1
                    fi
                    sleep 1
                done
                
                echo "Повторная проверка:"
                docker exec backpack_insight_backend env | grep API_SECRET | wc -c
            else
                echo "✅ Размеры совпадают!"
            fi
            
            # Тест API
            echo "Тестирование API..."
            if curl -f http://localhost:8000/ > /dev/null 2>&1; then
                echo "✅ Backend доступен"
            else
                echo "❌ Backend недоступен"
                docker compose -f docker-compose.server.yml logs --tail=20 backend
            fi

            docker image prune -f
            