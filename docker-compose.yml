services:
  db:
    image: postgres:15-alpine
    container_name: backpack_insight_db
    restart: always

    # --- Podman rootless fix ---
    # В rootless-режиме Podman запускает контейнеры в user namespace.
    # keep-id маппит UID хоста внутрь контейнера, давая право писать в volume.
    # Для обычного Docker эти директивы молча игнорируются.
    userns_mode: "keep-id"
    user: "0:0"

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Обязателен при user: 0:0 — иначе PG не инициализируется
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # init_db.sql убран: pg_trgm extension создаётся в Backend/DB/bootstrap.py.
      # Bind-mount этого файла вызывал "Permission denied" в Podman rootless.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: Backend/PlayerData/Dockerfile
    container_name: backpack_insight_backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    # Bind-mount ./Backend убран: в Podman rootless он монтируется с правами хоста
    # и перекрывает файлы скопированные в образ через COPY, из-за чего Python
    # не может найти модуль Backend.DB (ModuleNotFoundError).
    # Код уже полностью встроен в образ через Dockerfile — volume не нужен.

  web:
    build:
      context: .
      dockerfile: Frontend/Web/Dockerfile
    container_name: backpack_insight_web
    restart: always
    ports:
      - "5080:5080"
    environment:
      - BACKEND_API_URL=http://backend:8000
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    # Bind-mount ./Frontend/Web убран: в Podman rootless Bun не мог прочитать
    # рабочую директорию (CouldntReadCurrentDirectory) из-за UID-маппинга.
    # Статика и server.ts уже встроены в образ через Dockerfile.

volumes:
  postgres_data:
