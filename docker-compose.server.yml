services:
  db:
    image: postgres:15-alpine
    container_name: backpack_insight_db
    restart: always
    
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # API_SECRET передается только через env_file
    # Порт 5432 не открываем наружу для безопасности
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/DB/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    deploy:
      resources:
        limits:
          memory: 300M # Ограничиваем БД, чтобы оставить место бэкенду
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Backend/PlayerData/Dockerfile
    container_name: backpack_insight_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
      - .env.api
    environment:
      POSTGRES_SERVER: db
      # API_SECRET передается только через env_file
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./Backend:/app/Backend
    deploy:
      resources:
        limits:
          memory: 400M

volumes:
  postgres_data:
